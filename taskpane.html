<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeminiXL</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
      --border: #2a2a3a; --accent: #00e5a0; --accent2: #7c6cff;
      --text: #e8e8f0; --muted: #6b6b80; --error: #ff5757;
      --warn: #ffb347; --user-bubble: #1a1a2e; --ai-bubble: #0f1f18;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 26px; height: 26px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
    .logo-text { font-size: 15px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .api-config { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .api-row { display: flex; gap: 8px; align-items: center; }
    .api-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; outline: none; transition: border-color 0.2s; }
    .api-input:focus { border-color: var(--accent2); }
    .api-input::placeholder { color: var(--muted); }
    .btn-save { background: var(--accent2); border: none; border-radius: 6px; padding: 6px 12px; color: white; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
    .btn-save:hover { opacity: 0.85; }
    .sheet-bar { padding: 8px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .sheet-info { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
    .sheet-info span { color: var(--accent); }
    .btn-scan { background: transparent; border: 1px solid var(--accent); border-radius: 5px; padding: 4px 10px; color: var(--accent); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-scan:hover { background: var(--accent); color: var(--bg); }
    .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }
    .scan-progress { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); padding: 2px 0; display: none; }
    .scan-progress.visible { display: block; }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; display: none; }
    .progress-bar.visible { display: block; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
    .full-analysis-bar { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .btn-full-analysis { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; padding: 10px; color: white; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-full-analysis:hover { opacity: 0.9; }
    .btn-full-analysis:active { transform: scale(0.98); }
    .btn-full-analysis:disabled { opacity: 0.4; cursor: not-allowed; }
    .mode-bar { padding: 8px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; }
    .mode-btn { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 5px; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; }
    .mode-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(124,108,255,0.1); }
    .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 0 4px; }
    .msg.user .msg-label { color: var(--accent2); }
    .msg.ai .msg-label { color: var(--accent); }
    .msg.system .msg-label { color: var(--muted); }
    .msg.action .msg-label { color: var(--warn); }
    .msg-bubble { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble { background: var(--user-bubble); border: 1px solid var(--border); }
    .msg.ai .msg-bubble { background: var(--ai-bubble); border: 1px solid rgba(0,229,160,0.15); }
    .msg.system .msg-bubble { background: transparent; border: 1px dashed var(--border); color: var(--muted); font-size: 12px; }
    .msg.error .msg-bubble { background: rgba(255,87,87,0.1); border: 1px solid rgba(255,87,87,0.3); color: var(--error); }
    .msg.action .msg-bubble { background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.25); color: var(--warn); font-size: 12px; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; background: var(--ai-bubble); border: 1px solid rgba(0,229,160,0.15); border-radius: 8px; width: fit-content; }
    .typing-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
    .input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; outline: none; resize: none; min-height: 42px; max-height: 100px; transition: border-color 0.2s; line-height: 1.4; }
    .msg-input:focus { border-color: var(--accent2); }
    .msg-input::placeholder { color: var(--muted); }
    .btn-send { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; flex-shrink: 0; }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-send svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">Gemini<span>XL</span></div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="api-config">
    <div class="api-row">
      <input type="password" class="api-input" id="apiKeyInput" placeholder="Pega tu Gemini API Key aquí..."/>
      <button class="btn-save" onclick="saveApiKey()">Guardar</button>
    </div>
  </div>

  <div class="sheet-bar">
    <div style="flex:1">
      <div class="sheet-info" id="sheetInfo">Sin datos escaneados</div>
      <div class="scan-progress" id="scanProgress"></div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <button class="btn-scan" id="btnScan" onclick="scanWorkbook()">⟳ Escanear</button>
  </div>

  <div class="full-analysis-bar">
    <button class="btn-full-analysis" id="btnFullAnalysis" onclick="runFullAnalysis()">
      ⚡ Análisis Completo — Escribir en Excel
    </button>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" id="modeChatBtn" onclick="setMode('chat')">💬 Solo analizar</button>
    <button class="mode-btn" id="modeApplyBtn" onclick="setMode('apply')">⚙ Aplicar en Excel</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg system">
      <div class="msg-label">Sistema</div>
      <div class="msg-bubble">GeminiXL v2.0 ✦

1. Guarda tu API key
2. Presiona Escanear
3. ⚡ Análisis Completo → genera informe en hoja nueva
4. Modo "Aplicar en Excel" → Gemini manipula tu planilla directo</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea class="msg-input" id="msgInput" placeholder="Escribe tu instrucción en español..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

<script>
  let apiKey = '', workbookData = null, isLoading = false, currentMode = 'chat';

  Office.onReady((info) => { if (info.host === Office.HostType.Excel) loadApiKey(); });

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeChatBtn').classList.toggle('active', mode === 'chat');
    document.getElementById('modeApplyBtn').classList.toggle('active', mode === 'apply');
    document.getElementById('msgInput').placeholder = mode === 'apply'
      ? 'Ej: "Colorea en rojo celdas negativas", "Crea hoja resumen", "Agrega fórmula en C10"...'
      : 'Escribe tu instrucción en español...';
  }

  function saveApiKey() {
    const input = document.getElementById('apiKeyInput');
    const key = input.value.trim();
    if (!key) return;
    apiKey = key;
    localStorage.setItem('geminiXL_key', key);
    input.value = '●'.repeat(20);
    document.getElementById('statusDot').classList.add('active');
    addMessage('system', '✓ API key guardada.');
  }

  function loadApiKey() {
    const saved = localStorage.getItem('geminiXL_key');
    if (saved) { apiKey = saved; document.getElementById('apiKeyInput').value = '●'.repeat(20); document.getElementById('statusDot').classList.add('active'); }
  }

  async function scanWorkbook() {
    if (!apiKey) { addMessage('error', 'Primero guarda tu API key.'); return; }
    const btn = document.getElementById('btnScan');
    const progress = document.getElementById('scanProgress');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    btn.disabled = true; progress.classList.add('visible'); progressBar.classList.add('visible');
    try {
      await Excel.run(async (context) => {
        const sheets = context.workbook.worksheets;
        sheets.load('items/name');
        await context.sync();
        let data = { sheets: [], totalCells: 0 };
        const total = sheets.items.length;
        for (let i = 0; i < total; i++) {
          const sheet = sheets.items[i];
          progress.textContent = `leyendo ${i+1}/${total}: ${sheet.name}`;
          progressFill.style.width = `${((i+1)/total)*100}%`;
          const usedRange = sheet.getUsedRangeOrNullObject();
          usedRange.load(['values','formulas','numberFormat','address','rowCount','columnCount']);
          await context.sync();
          if (usedRange.isNullObject) { data.sheets.push({ name: sheet.name, empty: true }); continue; }
          usedRange.format.fill.load('color');
          usedRange.format.font.load(['bold','color','size']);
          await context.sync();
          const cellMap = [];
          for (let r = 0; r < Math.min(usedRange.rowCount, 300); r++) {
            const row = [];
            for (let c = 0; c < Math.min(usedRange.columnCount, 50); c++) {
              const val = usedRange.values[r][c], formula = usedRange.formulas[r][c], fmt = usedRange.numberFormat[r][c];
              const hasFormula = formula && formula.toString().startsWith('=');
              row.push({ v: (val !== '' && val !== null) ? val : null, f: hasFormula ? formula : null, fmt: (fmt !== 'General' && fmt) ? fmt : null });
            }
            cellMap.push(row);
          }
          data.sheets.push({ name: sheet.name, address: usedRange.address, rows: usedRange.rowCount, cols: usedRange.columnCount, cells: cellMap, fillColor: usedRange.format.fill.color, fontColor: usedRange.format.font.color });
          data.totalCells += usedRange.rowCount * usedRange.columnCount;
        }
        workbookData = data;
        document.getElementById('sheetInfo').innerHTML = `<span>${data.sheets.length}</span> hojas · <span>${data.totalCells.toLocaleString()}</span> celdas`;
        progress.classList.remove('visible'); progressBar.classList.remove('visible'); btn.disabled = false;
        addMessage('system', `✓ Escaneado: ${data.sheets.map(s=>s.name).join(', ')}`);
      });
    } catch(err) { progress.classList.remove('visible'); progressBar.classList.remove('visible'); btn.disabled = false; addMessage('error', 'Error: ' + err.message); }
  }

  async function runFullAnalysis() {
    if (!apiKey) { addMessage('error', 'Primero guarda tu API key.'); return; }
    if (!workbookData) { addMessage('error', 'Primero escanea el archivo.'); return; }
    if (isLoading) return;
    const btn = document.getElementById('btnFullAnalysis');
    btn.disabled = true; btn.textContent = '⏳ Analizando...'; isLoading = true;
    addMessage('action', '⚡ Ejecutando análisis completo (5 secciones)...');
    const prompt = `Eres un experto analista de Excel. Realiza un ANÁLISIS COMPLETO del siguiente archivo.

${buildSystemPrompt()}

Analiza estos 5 aspectos y usa EXACTAMENTE estos títulos separados por "---":
### 1. ESTRUCTURA GENERAL
(qué contiene cada hoja, propósito del archivo)
---
### 2. FÓRMULAS
(lista todas las fórmulas, explica cada una)
---
### 3. ERRORES E INCONSISTENCIAS
(datos faltantes, referencias rotas, problemas lógicos)
---
### 4. RESUMEN EJECUTIVO
(hallazgos clave en lenguaje simple)
---
### 5. COLORES Y FORMATOS
(qué significan los colores y formatos)`;

    try {
      const response = await callGemini('', prompt);
      addMessage('ai', response);
      await writeAnalysisToExcel(response);
      addMessage('action', '✓ Análisis escrito en la hoja "GeminiXL - Análisis"');
    } catch(err) { addMessage('error', 'Error: ' + err.message); }
    btn.disabled = false; btn.innerHTML = '⚡ Análisis Completo — Escribir en Excel'; isLoading = false;
  }

  async function writeAnalysisToExcel(analysisText) {
    await Excel.run(async (context) => {
      const sheets = context.workbook.worksheets;
      sheets.load('items/name');
      await context.sync();
      const existing = sheets.items.find(s => s.name === 'GeminiXL - Análisis');
      if (existing) { existing.delete(); await context.sync(); }
      const newSheet = sheets.add('GeminiXL - Análisis');
      await context.sync();
      const titleCell = newSheet.getRange('A1');
      titleCell.values = [['ANÁLISIS GEMINI XL — ' + new Date().toLocaleString('es-CL')]];
      titleCell.format.font.bold = true; titleCell.format.font.size = 14;
      titleCell.format.font.color = '#00e5a0'; titleCell.format.fill.color = '#0a0a0f';
      const sections = analysisText.split('---').filter(s => s.trim());
      let currentRow = 3;
      for (const section of sections) {
        const lines = section.trim().split('\n').filter(l => l.trim());
        if (!lines.length) continue;
        const titleRange = newSheet.getRange(`A${currentRow}`);
        titleRange.values = [[lines[0].replace(/^###\s*/, '').trim()]];
        titleRange.format.font.bold = true; titleRange.format.font.size = 12;
        titleRange.format.font.color = '#7c6cff'; titleRange.format.fill.color = '#1a1a24';
        currentRow++;
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) { currentRow++; continue; }
          const cell = newSheet.getRange(`A${currentRow}`);
          cell.values = [[line]];
          cell.format.font.size = 11;
          cell.format.font.color = (line.toLowerCase().includes('error') || line.toLowerCase().includes('inconsistencia')) ? '#ff5757' : '#e8e8f0';
          currentRow++;
        }
        currentRow++;
      }
      newSheet.getRange('A:A').format.columnWidth = 600;
      newSheet.activate();
      await context.sync();
    });
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isLoading) return;
    if (!apiKey) { addMessage('error', 'Primero guarda tu API key.'); return; }
    if (!workbookData) { addMessage('error', 'Primero escanea el archivo.'); return; }
    addMessage('user', text);
    input.value = ''; input.style.height = 'auto';
    isLoading = true; document.getElementById('btnSend').disabled = true;
    const typingId = addTyping();
    try {
      if (currentMode === 'apply') {
        await handleApplyMode(text, typingId);
      } else {
        const response = await callGemini(buildSystemPrompt(), text);
        removeTyping(typingId); addMessage('ai', response);
      }
    } catch(err) { removeTyping(typingId); addMessage('error', 'Error: ' + err.message); }
    isLoading = false; document.getElementById('btnSend').disabled = false;
  }

  async function handleApplyMode(userInstruction, typingId) {
    const systemPrompt = `Eres experto en Excel y Office.js. El usuario quiere manipular su planilla.

${buildSystemPrompt()}

Responde SOLO con JSON válido (sin markdown, sin texto extra):
{"explanation": "lo que harás", "actions": [...]}

Acciones disponibles:
- {"type":"setCellValue","sheet":"nombre","cell":"A1","value":"texto"}
- {"type":"setCellFormula","sheet":"nombre","cell":"A1","formula":"=SUMA(A1:A10)"}
- {"type":"setRangeValues","sheet":"nombre","range":"A1:C3","values":[[...]]}
- {"type":"setCellColor","sheet":"nombre","range":"A1:A10","color":"#FF0000"}
- {"type":"setFontColor","sheet":"nombre","range":"A1:A10","color":"#FFFFFF"}
- {"type":"setFontBold","sheet":"nombre","range":"A1:A10","bold":true}
- {"type":"addSheet","name":"Nueva Hoja"}
- {"type":"clearRange","sheet":"nombre","range":"A1:Z100"}
- {"type":"autoFit","sheet":"nombre"}`;

    const response = await callGemini(systemPrompt, userInstruction);
    removeTyping(typingId);
    let parsed;
    try { parsed = JSON.parse(response.replace(/```json|```/g,'').trim()); }
    catch(e) { addMessage('ai', response); return; }
    addMessage('action', `⚙ Ejecutando: ${parsed.explanation}`);
    try {
      await executeActions(parsed.actions);
      addMessage('action', `✓ Listo — ${parsed.actions.length} acción(es) aplicada(s)`);
    } catch(err) { addMessage('error', 'Error al aplicar: ' + err.message); }
  }

  async function executeActions(actions) {
    await Excel.run(async (context) => {
      const sheets = context.workbook.worksheets;
      sheets.load('items/name');
      await context.sync();
      for (const action of actions) {
        try {
          let sheet = action.sheet ? (sheets.items.find(s => s.name === action.sheet) || sheets.items[0]) : sheets.items[0];
          switch(action.type) {
            case 'setCellValue': sheet.getRange(action.cell).values = [[action.value]]; break;
            case 'setCellFormula': sheet.getRange(action.cell).formulas = [[action.formula]]; break;
            case 'setRangeValues': sheet.getRange(action.range).values = action.values; break;
            case 'setCellColor': sheet.getRange(action.range).format.fill.color = action.color; break;
            case 'setFontColor': sheet.getRange(action.range).format.font.color = action.color; break;
            case 'setFontBold': sheet.getRange(action.range).format.font.bold = action.bold; break;
            case 'addSheet': if (!sheets.items.find(s => s.name === action.name)) sheets.add(action.name); break;
            case 'clearRange': sheet.getRange(action.range).clear(); break;
            case 'autoFit': sheet.getUsedRange().format.autofitColumns(); sheet.getUsedRange().format.autofitRows(); break;
          }
        } catch(e) { console.warn('Action error:', action.type, e.message); }
      }
      await context.sync();
    });
  }

  async function callGemini(systemPrompt, userMessage) {
    const body = { contents: [{ role: 'user', parts: [{ text: userMessage }] }], generationConfig: { temperature: 0.2, maxOutputTokens: 8192 } };
    if (systemPrompt) body.system_instruction = { parts: [{ text: systemPrompt }] };
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || 'Error de API'); }
    const data = await response.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sin respuesta';
  }

  function buildSystemPrompt() {
    if (!workbookData) return '';
    let prompt = `ARCHIVO EXCEL:\n- Hojas: ${workbookData.sheets.length}\n- Celdas: ${workbookData.totalCells}\n`;
    for (const sheet of workbookData.sheets) {
      if (sheet.empty) { prompt += `\nHOJA "${sheet.name}": vacía\n`; continue; }
      prompt += `\nHOJA "${sheet.name}" (${sheet.rows}×${sheet.cols}):\n`;
      for (let r = 0; r < Math.min(sheet.rows, 150); r++) {
        const rowData = [];
        for (let c = 0; c < Math.min(sheet.cols, 30); c++) {
          const cell = sheet.cells[r]?.[c];
          if (!cell) continue;
          const parts = [];
          if (cell.v !== null) parts.push(`v:"${cell.v}"`);
          if (cell.f) parts.push(`f:"${cell.f}"`);
          if (cell.fmt) parts.push(`fmt:"${cell.fmt}"`);
          if (parts.length) rowData.push(`[F${r+1}C${c+1}:${parts.join(',')}]`);
        }
        if (rowData.length) prompt += rowData.join(' ') + '\n';
      }
    }
    prompt += '\nResponde siempre en español.';
    return prompt;
  }

  function addMessage(type, text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    const labels = { user:'Tú', ai:'Gemini', system:'Sistema', error:'Error', action:'Acción' };
    div.innerHTML = `<div class="msg-label">${labels[type]||type}</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
    area.appendChild(div); area.scrollTop = area.scrollHeight;
    return div;
  }

  function addTyping() {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing-' + Date.now();
    div.innerHTML = `<div class="msg-label">Gemini</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    area.appendChild(div); area.scrollTop = area.scrollHeight;
    return div.id;
  }

  function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
  function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
</script>
</body>
</html>
