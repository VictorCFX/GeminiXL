<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeminiXL</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #00e5a0;
      --accent2: #7c6cff;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --error: #ff5757;
      --user-bubble: #1a1a2e;
      --ai-bubble: #0f1f18;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent); }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    /* API CONFIG */
    .api-config {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .api-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-input:focus { border-color: var(--accent2); }
    .api-input::placeholder { color: var(--muted); }

    .btn-save {
      background: var(--accent2);
      border: none;
      border-radius: 6px;
      padding: 7px 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-save:hover { opacity: 0.85; }

    /* SHEET INFO BAR */
    .sheet-bar {
      padding: 8px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sheet-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .sheet-info span { color: var(--accent); }

    .btn-scan {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 5px;
      padding: 4px 10px;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-scan:hover { background: var(--accent); color: var(--bg); }
    .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* MESSAGES */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .msg.user .msg-label { color: var(--accent2); }
    .msg.ai .msg-label { color: var(--accent); }
    .msg.system .msg-label { color: var(--muted); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bubble);
      border: 1px solid rgba(0, 229, 160, 0.15);
    }

    .msg.system .msg-bubble {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-size: 12px;
    }

    .msg.error .msg-bubble {
      background: rgba(255, 87, 87, 0.1);
      border: 1px solid rgba(255, 87, 87, 0.3);
      color: var(--error);
    }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 14px;
      background: var(--ai-bubble);
      border: 1px solid rgba(0, 229, 160, 0.15);
      border-radius: 8px;
      width: fit-content;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* QUICK ACTIONS */
    .quick-actions {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }

    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* INPUT AREA */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 100px;
      transition: border-color 0.2s;
      line-height: 1.4;
    }
    .msg-input:focus { border-color: var(--accent2); }
    .msg-input::placeholder { color: var(--muted); }

    .btn-send {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-send svg { width: 18px; height: 18px; fill: white; }

    /* SCAN PROGRESS */
    .scan-progress {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      padding: 2px 0;
      display: none;
    }
    .scan-progress.visible { display: block; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">Gemini<span>XL</span></div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- API CONFIG -->
  <div class="api-config">
    <div class="api-row">
      <input type="password" class="api-input" id="apiKeyInput" placeholder="Pega tu Gemini API Key aquí..." />
      <button class="btn-save" onclick="saveApiKey()">Guardar</button>
    </div>
  </div>

  <!-- SHEET INFO BAR -->
  <div class="sheet-bar">
    <div class="sheet-info" id="sheetInfo">
      Sin datos escaneados
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:3px;">
      <button class="btn-scan" id="btnScan" onclick="scanWorkbook()">⟳ Escanear</button>
      <div class="scan-progress" id="scanProgress">escaneando...</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">
    <div class="msg system">
      <div class="msg-label">Sistema</div>
      <div class="msg-bubble">Bienvenido a GeminiXL. Guarda tu API key, luego presiona Escanear para cargar tu Excel completo (hojas, fórmulas, formatos, colores). Después escribe cualquier instrucción en español.</div>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="quickAction('Analiza la estructura general de este archivo Excel y describe qué contiene cada hoja')">📋 Analizar estructura</button>
    <button class="quick-btn" onclick="quickAction('Identifica todas las fórmulas usadas y explica qué hace cada una')">𝑓 Ver fórmulas</button>
    <button class="quick-btn" onclick="quickAction('Detecta posibles errores, inconsistencias o datos faltantes en las hojas')">⚠ Detectar errores</button>
    <button class="quick-btn" onclick="quickAction('Resume los datos más importantes de este archivo en un párrafo ejecutivo')">📊 Resumen ejecutivo</button>
    <button class="quick-btn" onclick="quickAction('¿Qué significan los colores y formatos usados en las celdas?')">🎨 Explicar colores</button>
    <button class="quick-btn" onclick="quickAction('Sugiere mejoras para este Excel: estructura, fórmulas, visualización')">💡 Sugerir mejoras</button>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="msg-input" id="msgInput" placeholder="Escribe tu instrucción en español..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

<script>
  let apiKey = '';
  let workbookData = null;
  let isLoading = false;

  // ── OFFICE INIT ──
  Office.onReady((info) => {
    if (info.host === Office.HostType.Excel) {
      loadApiKey();
    }
  });

  // ── API KEY ──
  function saveApiKey() {
    const input = document.getElementById('apiKeyInput');
    const key = input.value.trim();
    if (!key) return;
    apiKey = key;
    localStorage.setItem('geminiXL_key', key);
    input.value = '●'.repeat(20);
    document.getElementById('statusDot').classList.add('active');
    addMessage('system', 'API key guardada. Ahora presiona Escanear para cargar tu archivo.');
  }

  function loadApiKey() {
    const saved = localStorage.getItem('geminiXL_key');
    if (saved) {
      apiKey = saved;
      document.getElementById('apiKeyInput').value = '●'.repeat(20);
      document.getElementById('statusDot').classList.add('active');
    }
  }

  // ── SCAN WORKBOOK ──
  async function scanWorkbook() {
    if (!apiKey) {
      addMessage('error', 'Primero guarda tu API key.');
      return;
    }

    const btn = document.getElementById('btnScan');
    const progress = document.getElementById('scanProgress');
    btn.disabled = true;
    progress.classList.add('visible');
    progress.textContent = 'leyendo hojas...';

    try {
      await Excel.run(async (context) => {
        const workbook = context.workbook;
        const sheets = workbook.worksheets;
        sheets.load('items/name');
        await context.sync();

        let data = { sheets: [], totalCells: 0, summary: '' };

        for (let i = 0; i < sheets.items.length; i++) {
          const sheet = sheets.items[i];
          progress.textContent = `leyendo hoja ${i + 1}/${sheets.items.length}: ${sheet.name}`;

          const usedRange = sheet.getUsedRangeOrNullObject();
          usedRange.load(['values', 'formulas', 'numberFormat', 'address', 'rowCount', 'columnCount']);
          await context.sync();

          if (usedRange.isNullObject) {
            data.sheets.push({ name: sheet.name, empty: true });
            continue;
          }

          // Read cell formats (colors, bold, etc.)
          progress.textContent = `leyendo formatos hoja: ${sheet.name}`;
          const formats = usedRange.format;
          formats.fill.load('color');
          formats.font.load(['bold', 'color', 'size']);
          await context.sync();

          // Build cell map with details
          const cellMap = [];
          const rows = usedRange.rowCount;
          const cols = usedRange.columnCount;

          for (let r = 0; r < Math.min(rows, 200); r++) {
            const row = [];
            for (let c = 0; c < Math.min(cols, 50); c++) {
              const val = usedRange.values[r][c];
              const formula = usedRange.formulas[r][c];
              const fmt = usedRange.numberFormat[r][c];
              const hasFormula = formula && formula.toString().startsWith('=');
              row.push({
                v: val !== '' && val !== null ? val : null,
                f: hasFormula ? formula : null,
                fmt: fmt !== 'General' && fmt ? fmt : null,
              });
            }
            cellMap.push(row);
          }

          data.sheets.push({
            name: sheet.name,
            address: usedRange.address,
            rows: rows,
            cols: cols,
            cells: cellMap,
            fillColor: formats.fill.color,
            fontBold: formats.font.bold,
            fontColor: formats.font.color,
            fontSize: formats.font.size,
          });

          data.totalCells += rows * cols;
        }

        workbookData = data;

        // Update sheet info bar
        const sheetNames = data.sheets.map(s => s.name).join(', ');
        document.getElementById('sheetInfo').innerHTML =
          `<span>${data.sheets.length}</span> hojas · <span>${data.totalCells.toLocaleString()}</span> celdas`;

        progress.classList.remove('visible');
        btn.disabled = false;

        addMessage('system', `✓ Escaneado completo. ${data.sheets.length} hoja(s): ${sheetNames}. Listo para analizar.`);
      });
    } catch (err) {
      progress.classList.remove('visible');
      btn.disabled = false;
      addMessage('error', 'Error al escanear: ' + err.message);
    }
  }

  // ── QUICK ACTION ──
  function quickAction(text) {
    document.getElementById('msgInput').value = text;
    sendMessage();
  }

  // ── SEND MESSAGE ──
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isLoading) return;
    if (!apiKey) { addMessage('error', 'Primero guarda tu API key.'); return; }
    if (!workbookData) { addMessage('error', 'Primero escanea el archivo con el botón Escanear.'); return; }

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    isLoading = true;
    document.getElementById('btnSend').disabled = true;

    const typingId = addTyping();

    try {
      const systemPrompt = buildSystemPrompt();
      const response = await callGemini(systemPrompt, text);
      removeTyping(typingId);
      addMessage('ai', response);
    } catch (err) {
      removeTyping(typingId);
      addMessage('error', 'Error de API: ' + err.message);
    }

    isLoading = false;
    document.getElementById('btnSend').disabled = false;
  }

  // ── BUILD SYSTEM PROMPT ──
  function buildSystemPrompt() {
    if (!workbookData) return '';

    let prompt = `Eres un experto analista de Excel. Tienes acceso COMPLETO al siguiente archivo Excel con todos sus detalles.

DATOS DEL ARCHIVO:
- Total de hojas: ${workbookData.sheets.length}
- Total de celdas con datos: ${workbookData.totalCells}

`;

    for (const sheet of workbookData.sheets) {
      if (sheet.empty) {
        prompt += `\n### HOJA: "${sheet.name}" (vacía)\n`;
        continue;
      }

      prompt += `\n### HOJA: "${sheet.name}"
- Rango usado: ${sheet.address}
- Filas: ${sheet.rows} | Columnas: ${sheet.cols}
- Color de relleno del rango: ${sheet.fillColor || 'sin color específico'}
- Fuente negrita: ${sheet.fontBold} | Color fuente: ${sheet.fontColor} | Tamaño: ${sheet.fontSize}

DATOS Y FÓRMULAS (fila x columna):
`;

      // Build readable cell data
      const maxRows = Math.min(sheet.rows, 100);
      const maxCols = Math.min(sheet.cols, 30);

      for (let r = 0; r < maxRows; r++) {
        const rowData = [];
        for (let c = 0; c < maxCols; c++) {
          const cell = sheet.cells[r] && sheet.cells[r][c];
          if (!cell) continue;
          const parts = [];
          if (cell.v !== null && cell.v !== undefined) parts.push(`val:"${cell.v}"`);
          if (cell.f) parts.push(`formula:"${cell.f}"`);
          if (cell.fmt) parts.push(`formato:"${cell.fmt}"`);
          if (parts.length > 0) rowData.push(`[F${r+1}C${c+1}: ${parts.join(', ')}]`);
        }
        if (rowData.length > 0) prompt += rowData.join(' ') + '\n';
      }
    }

    prompt += `\nResponde SIEMPRE en español. Sé preciso, técnico y útil. Si identificas fórmulas, explícalas. Si ves formatos o colores relevantes, mencionarlos. El usuario es un profesional que trabaja con estos archivos.`;

    return prompt;
  }

  // ── CALL GEMINI ──
  async function callGemini(systemPrompt, userMessage) {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents: [{ role: 'user', parts: [{ text: userMessage }] }],
          generationConfig: {
            temperature: 0.2,
            maxOutputTokens: 2048,
          }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'Error de API');
    }

    const data = await response.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sin respuesta';
  }

  // ── UI HELPERS ──
  function addMessage(type, text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `msg ${type}`;

    const labels = { user: 'Tú', ai: 'Gemini', system: 'Sistema', error: 'Error' };
    div.innerHTML = `
      <div class="msg-label">${labels[type] || type}</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  function addTyping() {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-' + Date.now();
    div.innerHTML = `
      <div class="msg-label">Gemini</div>
      <div class="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div.id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
</body>
</html>
